<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um Coração para Você</title>

    <link rel="stylesheet" href="css/love.css">

    <style>
        /* Imagem fixa no canto inferior direito */
        .imagem-canto {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 250px; /* Aumentei o tamanho aqui */
            height: 250px; /* Definir altura igual à largura ajuda no formato */
            object-fit: cover; /* Garante que a foto não fique esticada */
            z-index: 1000;
            opacity: 0;

            /* FORMATO DE CORAÇÃO */
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            /* Como o path acima é complexo, usamos uma escala para ele preencher o tamanho da imagem */
            transform-origin: center;
            
            /* Ajuste simplificado do formato de coração usando shapes modernos */
            clip-path: polygon(50% 15%, 80% 0%, 100% 20%, 100% 50%, 50% 95%, 0% 50%, 0% 20%, 20% 0%);
            /* Nota: O polígono acima cria um coração geométrico. 
               Para um coração perfeito, usamos o círculo com bordas ou máscara. */

            /* Versão mais suave do coração: */
            border-radius: 50% 50% 50% 50% / 40% 40% 0% 0%; /* Base para o ajuste */

            /* Animações */
            animation: aparecer 2s ease forwards,
                        flutuar 3s ease-in-out infinite 2s;
        }

        /* Melhorando o formato de coração via CSS puro para imagens quadradas */
        .coracao-foto {
            clip-path: url(#heart-path); /* Referência ao SVG abaixo */
            width: 250px;
            height: 250px;
            object-fit: cover;
        }

        @keyframes aparecer {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes flutuar {
            0% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>

<body>

    <svg width="0" height="0">
      <defs>
        <clipPath id="heart-path" clipPathUnits="objectBoundingBox">
          <path d="M0.5,0.9 C0.4,0.8 0,0.6 0,0.34 C0,0.1 0.2,0 0.4,0 C0.5,0 0.5,0.1 0.5,0.1 C0.5,0.1 0.5,0 0.6,0 C0.8,0 1,0.1 1,0.34 C1,0.6 0.6,0.8 0.5,0.9"></path>
        </clipPath>
      </defs>
    </svg>

    <div id="mute-button">&#128266;</div>
    <div id="petal-container"></div>

    <audio id="audios" loop preload="auto">
        <source src="MP3/1.mp3" />
    </audio>

    <div class="container">
        <div class="body_left">
            <img src="images/biubiubiu.gif" alt="">
        </div>

        <div class="body_center love">
            <div class="block">
                <div class="div1"></div>
                <div class="div2"></div>
                <div class="div3"></div>
                <div class="div4"></div>
            </div>
        </div>
    </div>

    <img src="images/duda.jpeg" class="imagem-canto coracao-foto" alt="Imagem especial">

    <script src="js/love.js"></script>

</body>
</html>
